<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>syncedview - pykitten</title>
    <script src="/htmx.min.js"></script>
  </head>
  <body>
    syncedview - watch videos together
    <ul
      id="rooms"
      hx-get="./list_rooms"
      hx-trigger="load, every 5s"
      hx-swap="innerHTML"
    >
    </ul>
    create a youtube room
    <form hx-get="./create_yt_room" hx-swap="none">
      <label for="name">name</label>
      <input type="text" name="name" /><br />
      <label
        for="videoId"
        title="example: in the url https://www.youtube.com/watch?v=dQw4w9WgXcQ
the id is dQw4w9WgXcQ"
      >video id</label>
      <input type="text" name="videoId" /><br />
      <label>quality no greater than</label>
      <select name="quality">
        <option value="2160">2160p (4K)</option>
        <option value="1440">1440p (2K)</option>
        <option value="1080" selected>1080p (FHD)</option>
        <option value="720">720p (HD)</option>
        <option value="480">480p</option>
        <option value="360" selected>360p</option>
        <option value="240">240p</option>
        <option value="144">144p</option>
      </select><br />
      <input type="submit" value="Create" />
    </form>
    create a raw uri room
    <form hx-get="./create_rawuri_room" hx-swap="none">
      <label for="name">name</label>
      <input type="text" name="name" /><br />
      <label
        for="uri"
        title="example: https://192.168.1.31:8081/host/suk_ala_banatak.mp4"
      >uri</label>
      <input type="text" name="uri" /><br />
      <input type="submit" value="Create" />
    </form>
  </body>
</html>
